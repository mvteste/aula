<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Categoria</title>

    <!-- Bootstrap 5 CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        /* Canvas ocupa a tela inteira */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* Container do formulário acima do efeito */
        .form-container {
            position: relative;
            z-index: 1;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 10px;
            color: white;
        }
    </style>
</head>

<body>

    <!-- Canvas do efeito Matrix -->
    <canvas id="matrixCanvas"></canvas>

    <div class="container mt-5">
        <div class="form-container">
            <h2 class="mb-4">Cadastro de Categoria</h2>

            <form>
                <div class="mb-3">
                    <label for="nomeCategoria" class="form-label">Nome da Categoria</label>
                    <input type="text"
                           class="form-control"
                           id="nomeCategoria"
                           placeholder="Ex: Eletrônicos"
                           required>
                </div>

                <div class="mb-3">
                    <label for="descricaoCategoria" class="form-label">Descrição</label>
                    <textarea class="form-control"
                              id="descricaoCategoria"
                              rows="3"
                              placeholder="Ex: Produtos eletrônicos em geral"></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        Cadastrar
                    </button>

                    <a href="index.html" class="btn btn-secondary">
                        Voltar
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Script efeito Matrix -->
    <script>
        const canvas = document.getElementById("matrixCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00FF00";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }

                drops[i]++;
            }
        }

        setInterval(draw, 33);

        // Ajusta ao redimensionar a tela
        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
